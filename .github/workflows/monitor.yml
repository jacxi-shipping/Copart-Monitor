
name: Copart Monitor

on:
  schedule:
    # Runs every 2 hours
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no notifications, no state update)"
        required: false
        default: "false"
        type: boolean
      test_telegram:
        description: "Send a test Telegram message only"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write   # Needed to commit state.json back to the repo

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout (with full history so we can push back)
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------ #
      # 2. Set up Python
      # ------------------------------------------------------------------ #
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ------------------------------------------------------------------ #
      # 3. Install Python dependencies
      # ------------------------------------------------------------------ #
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ------------------------------------------------------------------ #
      # 4. Install Playwright browsers (Chromium only for speed)
      # ------------------------------------------------------------------ #
      - name: Install Playwright Chromium
        run: |
          playwright install chromium

          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 \
            libnspr4 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libcups2t64 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            libx11-6 \
            libxcb1 \
            libxext6 \
            fonts-liberation
