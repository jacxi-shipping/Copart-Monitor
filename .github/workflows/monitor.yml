name: Copart Monitor

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no notifications, no state update)"
        required: false
        default: "false"
        type: boolean
      test_telegram:
        description: "Send a test Telegram message only"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

# Prevent two monitor runs overlapping and clobbering each other's commits
concurrency:
  group: copart-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libnss3 libnspr4 libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libx11-6 libxcb1 libxext6 fonts-liberation

      - name: Test Telegram connection
        if: ${{ github.event.inputs.test_telegram == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py --test-telegram

      - name: Run Copart monitor
        if: ${{ github.event.inputs.test_telegram != 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COPART_MAKES: ${{ vars.COPART_MAKES }}
          COPART_MODELS: ${{ vars.COPART_MODELS }}
          COPART_DAMAGE_TYPES: ${{ vars.COPART_DAMAGE_TYPES }}
          COPART_MAX_PAGES: ${{ vars.COPART_MAX_PAGES }}
          COPART_YEAR_MIN: ${{ vars.COPART_YEAR_MIN }}
          COPART_YEAR_MAX: ${{ vars.COPART_YEAR_MAX }}
          COPART_MAX_ODOMETER: ${{ vars.COPART_MAX_ODOMETER }}
          COPART_TARGET_PRICES: ${{ vars.COPART_TARGET_PRICES }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python monitor.py --dry-run
          else
            python monitor.py
          fi

      - name: Commit state and watchlist
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.test_telegram != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json watchlist.json
          git add watchlist_archive.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: update state [skip ci]" && git pull --rebase && git push)
